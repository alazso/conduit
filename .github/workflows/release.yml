name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build artifacts only; do not tag or publish a release
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          GRADLE_VERSION="$(sed -n 's/^version=//p' gradle.properties | tr -d '[:space:]')"
          if [ -z "$GRADLE_VERSION" ]; then
            echo "Could not read version from gradle.properties" >&2
            exit 1
          fi
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
            TAG_VERSION="${TAG#v}"
            if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
              echo "Tag $TAG (${TAG_VERSION}) does not match gradle.properties (${GRADLE_VERSION})" >&2
              exit 1
            fi
          else
            TAG="v${GRADLE_VERSION}"
          fi
          echo "version=${GRADLE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Skip if release already published
        id: published
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ASSET_COUNT="$(gh release view "$TAG" --json assets -q '.assets | length')"
          if [ "$ASSET_COUNT" -ge 4 ]; then
            echo "Release $TAG already has ${ASSET_COUNT} assets; skipping duplicate publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 25
        if: steps.published.outputs.skip != 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        if: steps.published.outputs.skip != 'true'
        uses: gradle/actions/setup-gradle@v6

      - name: Build conduit-api and conduit-core
        if: steps.published.outputs.skip != 'true'
        run: |
          ./gradlew \
            :conduit-api:build \
            :conduit-core:build \
            :conduit-api:javadoc \
            :conduit-core:javadoc \
            --no-configuration-cache \
            --stacktrace

      - name: Publish conduit-api to repo.alaz.so
        if: steps.published.outputs.skip != 'true' && (github.event_name == 'push' || inputs.dry_run != true)
        env:
          ALAZSO_REPO_USER: ${{ secrets.ALAZSO_REPO_USER }}
          ALAZSO_REPO_TOKEN: ${{ secrets.ALAZSO_REPO_TOKEN }}
        run: |
          ./gradlew :conduit-api:publishLibraryPublicationToAlazsoRepository \
            --no-configuration-cache \
            --stacktrace

      - name: Stage release artifacts
        if: steps.published.outputs.skip != 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          STAGING="release-artifacts"
          mkdir -p "$STAGING"

          cp "conduit-core/build/libs/conduit-core-${VERSION}.jar" \
            "$STAGING/conduit-${VERSION}.jar"
          cp "conduit-api/build/libs/conduit-api-${VERSION}.jar" \
            "$STAGING/conduit-api-${VERSION}.jar"
          cp "conduit-core/build/libs/conduit-core-${VERSION}-javadoc.jar" \
            "$STAGING/conduit-${VERSION}-javadoc.jar"
          cp "conduit-api/build/libs/conduit-api-${VERSION}-javadoc.jar" \
            "$STAGING/conduit-api-${VERSION}-javadoc.jar"

          (cd "conduit-core/build/docs/javadoc" && \
            zip -rq "${GITHUB_WORKSPACE}/${STAGING}/conduit-${VERSION}-javadoc.zip" .)
          (cd "conduit-api/build/docs/javadoc" && \
            zip -rq "${GITHUB_WORKSPACE}/${STAGING}/conduit-api-${VERSION}-javadoc.zip" .)

          ls -lh "$STAGING"

      - name: Upload release artifact bundle
        if: steps.published.outputs.skip != 'true'
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ steps.version.outputs.tag }}
          path: release-artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: steps.published.outputs.skip != 'true' && (github.event_name == 'push' || inputs.dry_run != true)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          STAGING="release-artifacts"
          NOTES="${RUNNER_TEMP}/release-notes.md"

          {
            echo "## Conduit ${VERSION}"
            echo
            echo "Version \`${VERSION}\` from \`gradle.properties\` (also injected into \`paper-plugin.yml\` at build time)."
            echo
            echo "### Artifacts"
            echo
            echo "| File | Description |"
            echo "| --- | --- |"
            echo "| \`conduit-${VERSION}.jar\` | Conduit Paper/Folia plugin (bundles the API) |"
            echo "| \`conduit-api-${VERSION}.jar\` | Standalone API library for bridge authors |"
            echo "| \`conduit-${VERSION}-javadoc.jar\` | Javadoc JAR for the runtime module |"
            echo "| \`conduit-api-${VERSION}-javadoc.jar\` | Javadoc JAR for the API module |"
            echo "| \`conduit-${VERSION}-javadoc.zip\` | Browseable HTML Javadoc for the runtime |"
            echo "| \`conduit-api-${VERSION}-javadoc.zip\` | Browseable HTML Javadoc for the API |"
          } > "$NOTES"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$STAGING"/* --clobber
          else
            gh release create "$TAG" \
              --title "Conduit ${VERSION}" \
              --notes-file "$NOTES" \
              "$STAGING"/*
          fi
